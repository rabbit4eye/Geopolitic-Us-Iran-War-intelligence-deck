name: Fetch OSINT Data

# ════════════════════════════════════════
# รันทุก 6 ชั่วโมง + กดรันมือได้
# ════════════════════════════════════════
on:
  schedule:
    - cron: '0 */6 * * *'    # ทุก 6 ชม. (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:           # กดรันมือได้จาก GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # ให้เขียน commit กลับ repo ได้

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch OSINT feeds
        run: node scripts/fetch-osint.mjs

      - name: Commit updated data
        run: |
          git config user.name "GFI-Bot"
          git config user.email "gfi-bot@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "🔄 OSINT data update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
