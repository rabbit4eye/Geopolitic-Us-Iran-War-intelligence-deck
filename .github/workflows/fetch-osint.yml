name: Fetch OSINT Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch OSINT feeds
        run: node scripts/fetch-osint.mjs

      - name: Generate AI brief
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/ai-brief.mjs

      - name: Commit updated data
        run: |
          git config user.name "GFI-Bot"
          git config user.email "gfi-bot@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "🔄 OSINT data update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
